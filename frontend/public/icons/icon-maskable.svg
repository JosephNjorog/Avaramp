<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#7c6ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Full bleed background (maskable safe zone is center 80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Bolt centered in safe zone (roughly 100px inset on all sides) -->
  <polygon points="286,120 216,268 256,268 228,392 302,244 256,244" fill="white" filter="url(#glow)" opacity="0.95"/>
</svg>
